[project]
name = "geny"
version = "1.0.0"
description = "Geny (Geny Execute, Not You) - Autonomous Multi-Agent System"
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    # Web framework
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "python-multipart>=0.0.9",
    "httpx>=0.28.0",
    "python-dotenv>=1.0.0",
    "jinja2>=3.1.0",
    # Vector search
    "faiss-cpu>=1.9.0",
    "numpy>=1.26.0",
    # File pattern matching
    "pathspec>=0.12.0",
    # PostgreSQL database
    "psycopg[binary]>=3.2.0",
    "psycopg-pool>=3.2.0",
    # Web search
    "ddgs==9.11.4",
    # Web fetch & browser automation
    "playwright>=1.49.0",
    # WebSocket protocol
    "websockets>=13.0",
    # geny-executor: Pipeline-based execution engine
    # 0.36.x (executor uplift Phase 4 Weeks 7-8): Skills system lands in
    # inline-execution form. Adds geny_executor.skills subpackage — SKILL
    # .md frontmatter parser, loader, registry, SkillTool + SkillToolProvider
    # (plugs into Pipeline.from_manifest_async via the ToolProvider Protocol
    # shipped in 0.35.0). pyyaml>=6.0 becomes a core dep. All additive;
    # existing AgentSession usage unaffected.
    # 0.37.x (executor uplift Phase 5): subprocess hooks land. Stage 10
    # router fires PRE_TOOL_USE / POST_TOOL_USE / POST_TOOL_FAILURE
    # around every dispatch, honouring the returned HookOutcome (block
    # / modify_input). Two-switch opt-in (HookConfig.enabled +
    # GENY_ALLOW_HOOKS=1) plus fail-open semantics — without a runner
    # attached, dispatch is byte-identical to 0.36.x.
    "geny-executor[web]>=0.37.0,<0.38.0",
    # MCP (Model Context Protocol)
    "mcp>=1.0.0",
    # Auth
    "bcrypt>=5.0.0",
]

[project.optional-dependencies]
