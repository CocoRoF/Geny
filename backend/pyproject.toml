[project]
name = "geny"
version = "1.0.0"
description = "Geny (Geny Execute, Not You) - Autonomous Multi-Agent System"
readme = "README.md"
requires-python = ">=3.11"

dependencies = [
    # Web framework
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.5.0",
    "python-multipart>=0.0.9",
    "httpx>=0.28.0",
    "python-dotenv>=1.0.0",
    "jinja2>=3.1.0",
    # Vector search
    "faiss-cpu>=1.9.0",
    "numpy>=1.26.0",
    # File pattern matching
    "pathspec>=0.12.0",
    # PostgreSQL database
    "psycopg[binary]>=3.2.0",
    "psycopg-pool>=3.2.0",
    # Web search
    "ddgs==9.11.4",
    # Web fetch & browser automation
    "playwright>=1.49.0",
    # WebSocket protocol
    "websockets>=13.0",
    # geny-executor: Pipeline-based execution engine
    # 0.35.x (executor uplift Phase 3 closer): adds ToolProvider Protocol
    # + BuiltInToolProvider + Pipeline.from_manifest_async(tool_providers=
    # ...). Complements the existing AdhocToolProvider: ToolProvider is a
    # self-contained bundle with its own startup / shutdown lifecycle, so
    # hosts bundle their own tools (eventually GenyPlatformToolProvider)
    # without enumerating tool names in the manifest. All surfaces are
    # additive; existing AgentSession usage unaffected.
    "geny-executor[web]>=0.35.0,<0.36.0",
    # MCP (Model Context Protocol)
    "mcp>=1.0.0",
    # Auth
    "bcrypt>=5.0.0",
]

[project.optional-dependencies]
