upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # ── Max upload size (for shared folder / file uploads) ──
    client_max_body_size 50m;

    # ── Gzip compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ── Backend: API routes ─────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) support — disable ALL buffering layers
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable gzip for SSE — gzip buffers output which breaks streaming
        gzip               off;

        # Ensure chunked transfer works and connection stays open
        chunked_transfer_encoding on;
        proxy_set_header   Connection '';

        # Pass X-Accel-Buffering from backend (backend sends "no" for SSE)
        proxy_pass_header  X-Accel-Buffering;

        # WebSocket support (if needed in the future)
        # Note: for SSE we use Connection '' above; for WS use upgrade map
    }

    # ── Backend: WebSocket endpoints ───────────────────────────
    location /ws/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket upgrade
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Long-lived connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Backend: Health check endpoint ──────────────────────
    location = /health {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend: Static assets (3D models, etc.) ────────────
    location /static/assets/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cache static assets
        proxy_cache_valid  200 1h;
        expires            1h;
        add_header         Cache-Control "public, immutable";
    }

    # ── Backend: Chat attachment uploads ───────────────────
    # Content-addressable files produced by POST /api/uploads
    # (sha256-named). Served via FastAPI StaticFiles mount on
    # /app/static/uploads, backed by the geny-uploads docker volume.
    location /static/uploads/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Immutable content (sha256-addressed) — cache aggressively.
        proxy_cache_valid  200 1d;
        expires            1d;
        add_header         Cache-Control "public, max-age=86400, immutable";
    }

    # ── Backend: Live2D model files (long cache) ────────────
    location /static/live2d-models/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Live2D models are large binary assets — cache aggressively
        proxy_cache_valid  200 1d;
        expires            1d;
        add_header         Cache-Control "public, max-age=86400";
        add_header         Access-Control-Allow-Origin *;
    }

    # ── GPT-SoVITS WebUI (TTS Studio) ──────────────────────
    # Uses runtime DNS resolution so nginx starts even when
    # the gpt-sovits container is not running (--profile tts-local).
    location /tts-studio/ {
        resolver 127.0.0.11 valid=30s;
        set $gpt_sovits_upstream http://gpt-sovits:9874;
        proxy_pass         $gpt_sovits_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Gradio WebSocket support
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # File uploads for training data
        client_max_body_size 500m;
        proxy_read_timeout   600s;
    }

    # ── Frontend: Everything else ───────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Next.js HMR / WebSocket (for potential future dev proxy usage)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
    }
}

# ── WebSocket connection upgrade map ────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
