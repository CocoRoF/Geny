# ══════════════════════════════════════════════════════════════════════
#  Geny — Docker Compose (Production with Nginx Reverse Proxy / Full)
#
#  도메인을 연결하여 단일 포트(80)로 backend / frontend를 라우팅합니다.
#  TTS 로컬 엔진은 --profile tts-local 로 활성화할 수 있습니다.
#
#    /api/*            → backend:8000
#    /health           → backend:8000
#    /static/assets/*  → backend:8000
#    /*                → frontend:3000
#
#  Usage:
#    docker compose -f docker-compose.prod.yml up --build -d
#    docker compose -f docker-compose.prod.yml --profile tts-local up --build -d
#    docker compose -f docker-compose.prod.yml down
#    docker compose -f docker-compose.prod.yml logs -f
#
#  경량 버전 (TTS 없음):
#    docker compose -f docker-compose.prod-core.yml up --build -d
#
#  도메인 / SSL 설정:
#    DOMAIN=geny.example.com  → nginx server_name 에 반영
#    SSL 은 별도의 certbot 또는 Cloudflare 등으로 처리 후
#    nginx/nginx.conf 에 443 블록을 추가하세요.
#
#  Port 변경:
#    NGINX_PORT=58443 docker compose -f docker-compose.prod.yml up --build
#
#  TTS 설정:
#    GPT-SoVITS API URL → 설정 UI에서 http://gpt-sovits:9871 입력
#    Fish Speech API URL → 설정 UI에서 http://fish-speech:8080 입력
# ══════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: geny-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geny}
      POSTGRES_USER: ${POSTGRES_USER:-geny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geny123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: ${TIMEZONE:-Asia/Seoul}
    volumes:
      - geny-pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geny} -d ${POSTGRES_DB:-geny}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - geny-net-prod

  # ── Backend (FastAPI + LangGraph + Claude CLI) ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geny-backend-prod
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - GENY_AGENT_STORAGE_ROOT=/data/geny_agent_sessions
      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-geny}
      - POSTGRES_USER=${POSTGRES_USER:-geny}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-geny123}
      - AUTO_MIGRATION=true
      - TIMEZONE=${TIMEZONE:-Asia/Seoul}
    volumes:
      - geny-tts-cache-prod:/app/cache/tts
      - geny-voices-prod:/app/static/voices
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - geny-net-prod

  # ── Frontend (Next.js) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=http://backend:8000
        - NEXT_PUBLIC_API_URL=
    container_name: geny-frontend-prod
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - API_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - geny-net-prod

  # ── Nginx Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: geny-nginx-prod
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-58443}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - geny-net-prod

  # ── GPT-SoVITS (Optional — TTS 로컬 엔진, GPU 필요) ──────────────
  gpt-sovits:
    image: breakstring/gpt-sovits:latest
    container_name: geny-gpt-sovits-prod
    profiles: ["tts-local"]
    restart: unless-stopped
    expose:
      - "9871"
    volumes:
      - geny-voices-prod:/app/references:ro
      - gpt-sovits-models-prod:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - is_half=True
    networks:
      - geny-net-prod

  # ── Fish Speech (Optional — TTS 로컬 엔진, GPU 필요) ──────────────
  # fish-speech:
  #   image: fishaudio/fish-speech:latest
  #   container_name: geny-fish-speech-prod
  #   profiles: ["tts-local"]
  #   restart: unless-stopped
  #   entrypoint: ["/bin/bash", "/app/scripts/fish-speech-entrypoint.sh"]
  #   expose:
  #     - "8080"
  #   volumes:
  #     - ./fish-speech-checkpoints:/app/checkpoints
  #     - ./scripts/fish-speech-entrypoint.sh:/app/scripts/fish-speech-entrypoint.sh:ro
  #   environment:
  #     - FISH_SPEECH_AUTO_DOWNLOAD=${FISH_SPEECH_AUTO_DOWNLOAD:-false}
  #     - FISH_SPEECH_MODEL_REPO=${FISH_SPEECH_MODEL_REPO:-fishaudio/s2-pro}
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   networks:
  #     - geny-net-prod

networks:
  geny-net-prod:
    driver: bridge

volumes:
  geny-pgdata-prod:
    driver: local
  geny-tts-cache-prod:
    driver: local
  geny-voices-prod:
    driver: local
  gpt-sovits-models-prod:
    driver: local
