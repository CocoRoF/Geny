# ══════════════════════════════════════════════════════════════════════
#  Geny — Docker Compose (Standalone / Full)
#
#  전체 서비스 포함 (TTS 로컬 엔진은 --profile tts-local 로 활성화)
#
#  Usage:
#    docker compose up --build              # 기본 실행 (TTS 미포함)
#    docker compose up -d                   # 백그라운드 실행
#    docker compose --profile tts-local up  # TTS 로컬 엔진 포함
#    docker compose down                    # 종료
#    docker compose logs -f                 # 로그 확인
#
#  Port 변경:
#    BACKEND_PORT=8080 FRONTEND_PORT=3001 docker compose up --build
#
#  또는 .env 파일로 설정:
#    BACKEND_PORT=8080
#    FRONTEND_PORT=3001
#
#  TTS 설정:
#    GPT-SoVITS API URL → 설정 UI에서 http://gpt-sovits:9871 입력
#    Fish Speech API URL → 설정 UI에서 http://fish-speech:8080 입력
# ══════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: geny-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geny}
      POSTGRES_USER: ${POSTGRES_USER:-geny}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geny123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: ${TIMEZONE:-Asia/Seoul}
    volumes:
      - geny-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geny} -d ${POSTGRES_DB:-geny}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - geny-net

  # ── Backend (FastAPI + LangGraph + Claude CLI) ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geny-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - GENY_AGENT_STORAGE_ROOT=/data/geny_agent_sessions
      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-geny}
      - POSTGRES_USER=${POSTGRES_USER:-geny}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-geny123}
      - AUTO_MIGRATION=true
      - TIMEZONE=${TIMEZONE:-Asia/Seoul}
    volumes:
      - geny-tts-cache:/app/cache/tts
      - geny-voices:/app/static/voices
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - geny-net

  # ── Frontend (Next.js) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=http://backend:8000
    container_name: geny-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - API_URL=http://backend:8000
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - geny-net

  # ── GPT-SoVITS (Optional — TTS 로컬 엔진, GPU 필요) ──────────────
  gpt-sovits:
    image: breakstring/gpt-sovits:latest
    container_name: geny-gpt-sovits
    profiles: ["tts-local"]
    restart: unless-stopped
    ports:
      - "${GPT_SOVITS_PORT:-9871}:9871"
    volumes:
      - geny-voices:/app/references:ro
      - gpt-sovits-models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - is_half=True
    networks:
      - geny-net

  # ── Fish Speech (Optional — TTS 로컬 엔진, GPU 필요) ──────────────
  # fish-speech:
  #   image: fishaudio/fish-speech:latest
  #   container_name: geny-fish-speech
  #   profiles: ["tts-local"]
  #   restart: unless-stopped
  #   entrypoint: ["/bin/bash", "/app/scripts/fish-speech-entrypoint.sh"]
  #   ports:
  #     - "${FISH_SPEECH_PORT:-8080}:8080"
  #   volumes:
  #     - ./fish-speech-checkpoints:/app/checkpoints
  #     - ./scripts/fish-speech-entrypoint.sh:/app/scripts/fish-speech-entrypoint.sh:ro
  #   environment:
  #     - FISH_SPEECH_AUTO_DOWNLOAD=${FISH_SPEECH_AUTO_DOWNLOAD:-false}
  #     - FISH_SPEECH_MODEL_REPO=${FISH_SPEECH_MODEL_REPO:-fishaudio/s2-pro}
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   networks:
  #     - geny-net

networks:
  geny-net:
    driver: bridge

volumes:
  geny-pgdata:
    driver: local
  geny-tts-cache:
    driver: local
  geny-voices:
    driver: local
  gpt-sovits-models:
    driver: local
